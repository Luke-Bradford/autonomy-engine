name: Claude PR Review

on:
  pull_request:
    # `reopened` is included so close/reopen re-fires the review when GitHub
    # drops a `synchronize` push event (a real stall on PR #62): `gh pr close`
    # + `gh pr reopen` then re-runs the required `review` check, matching CI's
    # default trigger set. Adding a type only widens when the gate fires.
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]

jobs:
  review:
    if: github.event.pull_request.draft == false
    # #505: runs on the SELF-HOSTED Mac-mini runner so the review can call
    # `claude -p` on the operator's SUBSCRIPTION (keychain auth) instead of a
    # metered ANTHROPIC_API_KEY curl. The runner must run in the user session
    # (its LaunchAgent needs SessionCreate=false) or the login keychain is
    # unreadable and claude reports "Not logged in".
    runs-on: [self-hosted, claude-review]
    # A backstop against a hung job (GitHub's default is 6h). The review itself
    # is a single `claude -p` turn (~1-3 min) plus a few bounded gh calls.
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Put Homebrew tools on PATH (self-hosted Mac)
        # gh / python3 / claude live under /opt/homebrew on the Mac mini; the
        # runner service PATH may not include it. Prepend for all later steps.
        run: echo "/opt/homebrew/bin" >> "$GITHUB_PATH"

      - name: Get PR diff
        # #505: `gh pr diff` is a live GitHub API call; a transient 503 here
        # failed the whole review job on 2026-07-16 (CI/studio-ci, which make no
        # such call, stayed green). retry() absorbs the blip -- fail-safe: it
        # returns gh's own status once attempts exhaust, so a real failure still
        # reds the step. Wrapped in a function so each attempt re-runs the `>`.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -uo pipefail
          # shellcheck source=/dev/null
          . lib/ci_retry.sh
          fetch_diff() { gh pr diff "$PR_NUMBER" > pr.diff; }
          retry 5 3 fetch_diff || { echo "::error::gh pr diff failed after retries (transient GitHub API?)"; exit 1; }

      - name: Check if diff is doc-only
        # #192: ONE doc-only definition for the whole gate. This step sources
        # bin/safe_merge.sh (functions only, source-guarded) and calls the SAME
        # is_doc_only() the merge gate uses, fed by the SAME config keys
        # (merge_gate.doc_only_extensions / doc_only_paths, defaults .md +
        # docs/). Divergence between the bot-skip and the merge-gate predicate
        # deadlocked non-md docs assets (#183). An empty diff classifies as
        # NOT doc-only (review runs). Absent/unreadable config falls back to
        # the SAME engine defaults safe_merge itself applies -- both sides
        # stay aligned by construction; a corrupt config also collapses
        # merge_gate.strategy to `manual` on the gate side, so no unattended
        # merge path exists in that state (post-hoc codex review, adjudicated).
        id: docs_only
        shell: bash
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          set -euo pipefail
          # shellcheck source=/dev/null
          . lib/ci_retry.sh
          # #505: this failed as "origin/main not found" on 2026-07-16 even though
          # the checkout log shows origin/main WAS fetched -- a transient blip in
          # the same GitHub API window. If the ref is missing, re-fetch (retried)
          # before concluding it is genuinely absent, so a hiccup doesn't red the
          # gate. Still fail-safe: a ref that is truly gone after retries exits 1
          # (refuse rather than misclassify), exactly as before.
          if ! git rev-parse --verify --quiet "origin/${BASE_REF}" >/dev/null; then
            echo "origin/${BASE_REF} not present -- re-fetching (transient?)" >&2
            fetch_base() { git fetch --quiet origin "${BASE_REF}:refs/remotes/origin/${BASE_REF}"; }
            retry 4 3 fetch_base || true
          fi
          if ! git rev-parse --verify --quiet "origin/${BASE_REF}" >/dev/null; then
            echo "::error::origin/${BASE_REF} not found after re-fetch — cannot classify PR; failing to avoid misclassification"
            exit 1
          fi
          files=$(git diff --name-only "origin/${BASE_REF}...HEAD")
          # #468: the changed-path list also picks the review CHARTER (engine vs
          # studio vs both) in lib/review_prompt.py. Persist it here so both the
          # doc-only predicate and the charter read the SAME list -- a second
          # `git diff` could drift.
          printf '%s\n' "$files" > pr_files.txt
          exts="$( { python3 lib/config_parser.py .autonomy/config.yaml merge_gate.doc_only_extensions 2>/dev/null || true; } | paste -sd, -)"
          exts="${exts:-.md}"
          paths="$( { python3 lib/config_parser.py .autonomy/config.yaml merge_gate.doc_only_paths 2>/dev/null || true; } | paste -sd, -)"
          paths="${paths:-docs/}"
          # shellcheck source=/dev/null
          source bin/safe_merge.sh   # functions only (source-guard returns early)
          if [ -n "$files" ] && is_doc_only "$files" "$exts" "$paths"; then
            echo "docs_only=true" >> "$GITHUB_OUTPUT"
          else
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Post docs-only skip notice
        if: steps.docs_only.outputs.docs_only == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -uo pipefail
          # shellcheck source=/dev/null
          . lib/ci_retry.sh
          printf '## Claude Code Review\n\nDoc-only diff — engineering review skipped to save tokens. If this PR needs a review (e.g. material claims in the docs that affect behaviour), request one manually.\n' > skip_notice.md
          post_skip() { gh pr comment "$PR_NUMBER" --body-file skip_notice.md; }
          retry 5 3 post_skip || { echo "::error::gh pr comment (skip notice) failed after retries"; exit 1; }

      - name: Get PR comments
        if: steps.docs_only.outputs.docs_only != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          set -uo pipefail
          # shellcheck source=/dev/null
          . lib/ci_retry.sh
          # #505: live GitHub API call -- retry transient blips (fail-safe).
          get_comments() {
            gh api "repos/$REPO/issues/$PR_NUMBER/comments" \
              --jq '[.[] | "### Comment by " + .user.login + " at " + .created_at + "\n" + .body] | join("\n\n---\n\n")' \
              > pr_comments.txt
          }
          retry 5 3 get_comments || { echo "::error::gh api (PR comments) failed after retries"; exit 1; }

      - name: Get PR title + body
        if: steps.docs_only.outputs.docs_only != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -uo pipefail
          # shellcheck source=/dev/null
          . lib/ci_retry.sh
          # #505: live GitHub API call -- retry transient blips (fail-safe).
          get_desc() {
            gh pr view "$PR_NUMBER" --json title,body \
              --jq '"# " + .title + "\n\n" + (.body // "(no description)")' \
              > pr_description.txt
          }
          retry 5 3 get_desc || { echo "::error::gh pr view failed after retries"; exit 1; }

      - name: Build review prompt
        # #468: the charter is SCOPE-AWARE and lives in lib/review_prompt.py
        # (tested by tests/test_review_prompt.py), NOT inline here -- one charter
        # cannot review both the bash/Python engine and the studio/ TypeScript,
        # and reviewing a studio diff against engine invariants made the bot emit
        # an ARBITRARY verdict a merge rail read as truth. An inline heredoc is
        # untestable, which is how that survived.
        # #505: `--prompt` builds a single `claude -p` PROMPT (charter + diff) for
        # the SUBSCRIPTION transport; the charter, scope-awareness, and verdict
        # extraction are byte-identical to the old metered-API path.
        if: steps.docs_only.outputs.docs_only != 'true'
        run: |
          set -euo pipefail
          python3 lib/review_prompt.py --prompt \
            pr_files.txt pr.diff pr_description.txt pr_comments.txt prompt.txt

      - name: Review on the subscription (claude -p)
        # #505: was a metered `curl` to api.anthropic.com with ANTHROPIC_API_KEY.
        # 122 review runs/day drained the API allowance while the operator's
        # subscription sat idle. Now runs on the self-hosted Mac runner via
        # `claude -p` on the SUBSCRIPTION (keychain auth, apiKeySource=none) --
        # zero per-token cost.
        #
        # SECURITY -- this reviews UNTRUSTED content (the diff/description/comments
        # a PR carries) on a runner WITH keychain access, so the review must be a
        # pure, sandboxed TEXT analysis that cannot execute anything:
        #   * NO `--dangerously-skip-permissions` + `--allowedTools ""` -> the
        #     model has zero tools, so a prompt-injection in the diff cannot run
        #     Bash/Write/Edit (the #579 self-review's own BLOCKING finding).
        #   * `--setting-sources ""` -> load NEITHER the operator's user persona
        #     NOR the PR's checked-out `.claude/` (a malicious PR could otherwise
        #     add a SessionStart hook, which executes shell DIRECTLY, bypassing
        #     the tool allowlist). Keychain auth is independent of settings.
        #   * prompt via STDIN (`< prompt.txt`), not `"$(cat …)"` as an argv -- a
        #     large diff would otherwise blow ARG_MAX and spuriously red the gate.
        # Residual, accepted: the workflow + tooling run from the PR's checkout,
        # so a modified `review_prompt.py`/workflow could run code -- but only a
        # SAME-REPO PR can, i.e. the operator or the loop (trusted); fork PRs are
        # gated by GitHub's required-approval-for-outside-collaborators.
        #
        # FAIL-SAFE: extract-cli is fail-closed (is_error / no result -> exit 1 ->
        # red step), and the verdict guard below refuses a review that rendered no
        # verdict. So a claude auth/transport failure reds the gate, never passes.
        if: steps.docs_only.outputs.docs_only != 'true'
        run: |
          set -uo pipefail
          claude -p \
            --model sonnet \
            --allowedTools "" \
            --setting-sources "" \
            --output-format json < prompt.txt > response.json 2> claude-stderr.log || true
          [ -s claude-stderr.log ] && { echo "--- claude -p stderr ---"; cat claude-stderr.log; } >&2 || true
          # TESTED extractor (lib/review_prompt.py) -- #504/#501 lifted these out
          # of untestable heredocs. Exits non-zero on every unusable output.
          python3 lib/review_prompt.py --extract-cli response.json review.txt stop_reason.txt

      - name: Post review comment
        if: steps.docs_only.outputs.docs_only != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -uo pipefail
          # shellcheck source=/dev/null
          . lib/ci_retry.sh
          { echo "## Claude Code Review"; echo ""; cat review.txt; } > comment_body.txt
          # #505: a transient failure posting the comment would waste a whole
          # successful review (the diff+API cost is already spent). Retry it.
          post_review() { gh pr comment "$PR_NUMBER" --body-file comment_body.txt; }
          retry 5 3 post_review || { echo "::error::gh pr comment (review) failed after retries"; exit 1; }

      # #505: the old API-transport "Fail workflow on truncated review" step
      # (keyed on stop_reason == max_tokens) was removed with the metered curl.
      # `claude -p` does not return that stop_reason, and a truncated review is
      # already caught downstream: extract-cli is fail-closed, and the verdict
      # guard below reds the gate on any review that renders no verdict.

      # #501: `review` is REQUIRED under branch protection, so a green check is
      # what GitHub lets a merge through on. It went green on a review that
      # rendered NO verdict (PR #500: 6023 tokens of plain-text reasoning,
      # stop_reason `end_turn` so the max_tokens guard correctly never fired,
      # ending "Final answer below." -- its own last line concluded REQUEST
      # CHANGES). A missing verdict is not an approval, exactly as a `gh`
      # failure is never CI-green.
      #
      # The MERGE RAIL was never exposed: safe_merge.sh:137/141 reads the
      # comment BODY and refuses without an APPROVE. The gap is this check, and
      # the studio build loop, which merges with `gh pr merge` on "all required
      # green" and never calls safe_merge.
      #
      # RUNS AFTER the comment is posted, so the operator still reads the review
      # body even when it is unusable as a gate -- and after the max_tokens
      # guard, because a truncated review is ALSO verdict-less and that guard's
      # "raise max_tokens or split the PR" message is the actionable one.
      #
      # The doc-only guard is load-bearing, not ceremony: `review.txt` is
      # written by a doc-only-guarded step, so it never exists on that path and
      # an unguarded assert would RED every doc-only PR with no way to clear a
      # required check. (Same deadlock SHAPE as #183 -- a doc-only PR that
      # cannot merge -- though #183 was the merge gate diverging from the
      # bot-skip predicate, which #192 unified; not the same mechanism.)
      #
      # SCOPE: asserts a verdict was RENDERED, not that it was an approval.
      # REQUEST CHANGES still exits 0 -- see #502.
      - name: Fail workflow when the review rendered no verdict
        if: steps.docs_only.outputs.docs_only != 'true'
        run: |
          set -uo pipefail
          set +e
          VERDICT=$(python3 lib/review_prompt.py --verdict review.txt)
          STATUS=$?
          set -e
          if [ "$STATUS" -eq 1 ]; then
            echo "::error::Claude review posted NO usable verdict — the review gate certifies nothing, so it fails closed (#501). Re-run this job."
            exit 1
          fi
          if [ "$STATUS" -ne 0 ]; then
            # Distinct from "no verdict": the extractor itself is broken (a
            # traceback is on stderr above). Same fail-closed outcome, but do
            # not send the operator hunting the model's output for our bug.
            echo "::error::lib/review_prompt.py --verdict crashed (exit $STATUS) — the gate cannot certify this review. See the traceback above."
            exit 1
          fi
          echo "verdict=$VERDICT"
