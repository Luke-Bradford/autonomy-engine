# .autonomy/config.yaml -- per-repo policy for the autonomy engine.
# See autonomy-engine/README.md for the full schema reference.

board:
  owner: CHANGE-ME          # GitHub user or org that owns the Projects v2 board
  # Leave project_title EMPTY until a Projects v2 board actually exists -- the
  # engine never creates boards (settled decision 24), and a plausible-looking
  # name for a board nobody created makes board.sh warn-skip for the repo's
  # whole life while the config looks done (SD-31). Empty = board updates off;
  # board.sh and doctor.sh both surface that state explicitly.
  project_title: ""

engine:
  # label: my-repo          # uncomment + set only if this repo's basename collides
  #                         # with another target repo on the same machine
  # account_key: default    # uncomment + set only if this repo runs on a DIFFERENT
  #                         # Anthropic account than the machine's other repos --
  #                         # repos sharing an account share one usage-limit marker
  requires_claude_md: false  # set true if this repo's workflow assumes CLAUDE.md exists

agent:
  type: claude               # claude | codex
  # effort: high             # optional: low | medium | high | xhigh | max (omit = CLI default)
  model:
    primary: claude-sonnet-5
    fallback: claude-sonnet-4-6

merge_gate:
  strategy: manual           # manual | ci_only | bot_comment | gh_review
  # bot_comment-specific:
  # author_login: github-actions
  # marker: "Claude Code Review"
  # doc_only_extensions: [".md"]
  # gh_review-specific:
  # reviewer_login: some-reviewer-bot[bot]

# Health thresholds (autonomy-engine #81 / SD-32 §9). Optional; the defaults
# below apply when omitted.
# health:
#   wedged_after: 900        # secs a `session-running` loop may go without a
#                            # session-log/heartbeat write before `./start status`
#                            # (and, later, the dashboard) flags it WEDGED. Only a
#                            # WORKING session is judged -- an idle loop that
#                            # legitimately sleeps is never flagged. Default 900 (15m).

worktree:
  default_path: "../.{repo-slug}-autonomy"

# Multi-role org (autonomy-engine docs/superpowers/specs/
# 2026-07-02-dynamic-agent-org-design.md). Every agent -- standard or custom
# -- is the same declarative shape: enabled + account (a name from the
# machine accounts registry: python3 lib/accounts.py list) + trigger
# ({ type: loop | cron | event, ... }) + model/effort (or per-phase models)
# + scope (what it works over; empty = whole open board) + behaviour knobs.
# `prompt:` must point at a real pack file under .autonomy/roles/, never a
# copy. Validate with doctor.sh.
# Enabled `trigger: { type: loop }` roles are dispatched by the supervisor
# round-robin (one session each, in turn); cron/event triggers are not
# dispatched yet (scheduler/event bus is a later increment). A role with an
# `account:` that cannot resolve REFUSES its sessions (fail-safe).
# Knob wiring status is marked inline below: [wired] is consumed today,
# [rail-prose] only shapes the role's prompt, [#89] is validated but not yet
# consumed (the supervisor + doctor log an honest NOTE when you set one, so a
# no-op is never silent -- see #149). Wiring is tracked in #89.
# roles:
#   coder:
#     enabled: true
#     account: claude-sub              # python3 lib/accounts.py set claude-sub claude_subscription
#     trigger: { type: loop }
#     model: claude-sonnet-5
#     models: { plan: claude-opus-4-8, implement: claude-sonnet-5, test: claude-haiku-4-5 }  # [#89] per-phase not consumed; adapter takes one model
#     scope: { labels: [ready], milestone: current }
#     self_test: true                  # [#89] agents test their own work (not yet consumed)
#     blockers: raise-to-pm            # [#89] raise-to-pm | raise-to-human (not yet consumed)
#     lane: main                       # [#147] the lane this role runs in (default lane if omitted)
#   qa:
#     enabled: false
#     account: claude-sub
#     trigger: { type: event, on: [pr.opened, pr.synchronize] }
#     scope: { target: diff }          # diff | affected | full-regression
#     gate: wait-for-human             # [wired on QA] wait-for-human | auto-merge-on-pass (QA merge-path only; still gated by merge_gate.strategy)
#     tools: [read]                    # [#89] [read] | [read, mcp] (not yet consumed)
#     regression: { after_tickets: 10 }  # [#89] or { every: "0 3 * * 0" }; omit = off (not yet fired)
#     prompt: .autonomy/roles/qa.md
#   pm:
#     enabled: false
#     account: claude-sub
#     trigger: { type: cron, schedule: "0 */6 * * *" }
#     duties: [groom, prioritise, unblock, spec-check]  # [rail-prose] shapes the PM rail only, not enforced
#     prompt: .autonomy/roles/pm.md
#   researcher:
#     enabled: false
#     account: codex-sub               # python3 lib/accounts.py set codex-sub codex_subscription
#     trigger: { type: cron, schedule: "0 3 * * *" }
#     output: handoff-to-pm            # [rail-prose] raise-issues | handoff-to-pm (shapes the rail only)
#     web_search: false                # [rail-prose] shapes the rail only, not enforced
#     prompt: .autonomy/roles/researcher.md

# lanes: [#147] OPTIONAL. A lane is a named worktree + role subset -- run
# parallel worktrees of one repo, each scoped to different labels (settled-
# decisions 21-25). Omit entirely = one implicit lane named 'main' = today's
# behaviour (zero migration). The FIRST declared lane is the default. A role
# with no `lane:` runs in the default lane; a role's `lane:` must name a
# declared lane. Lanes with disjoint scope.labels never contend for a ticket --
# the label partition IS the claim (doctor WARNs on overlap; no runtime lease).
#   NOTE (Part 1 of #147): routing into lanes is live, but EXECUTING a non-
#   default lane (the supervisor --lane flag + per-lane launchd service) lands
#   in Part 2 -- until then a role pinned to a non-default lane does NOT run
#   (doctor warns). Cron/event roles fire in the default lane only unless pinned.
# lanes:
#   main:     { worktree: ../.myrepo-autonomy }   # relative path (not absolute)
#   frontend: { worktree: ../.myrepo-frontend }
