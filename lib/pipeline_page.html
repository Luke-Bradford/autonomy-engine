<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="ae-control-token" content="__CONTROL_TOKEN__">
<title>Autonomy · pipeline</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' rx='4' fill='%23141418'/%3E%3Ccircle cx='8' cy='8' r='3' fill='%235b9dff'/%3E%3C/svg%3E">
<style>
/* P3a (#357) viewer + P3b (#365) EDITOR. Token blocks are the UI-1 system,
   kept byte-identical to lib/dashboard_page.html / lib/config_page.html
   (the config page's parity test guards the source pair; this page copies
   the same three blocks -- if they ever drift, fix the source pair first,
   never fork a third scheme). A BOUND pipeline is editable (writes to the
   var-shadow via POST /api/control pipeline_save, token-gated); a wrapped
   role stays read-only. A live tick never clobbers unsaved edits (#202). */
:root{
  --sans:"Avenir Next","Helvetica Neue",system-ui,sans-serif;
  --mono:"SF Mono",Menlo,ui-monospace,monospace;
  --r:6px;
}
:root[data-theme="dark"]{
  --bg:#15181d; --bg-soft:#101318; --panel:#1c2027; --panel2:#20252d;
  --hair:#2a2f38; --hair2:#333a45; --shadow:0 8px 24px -14px rgba(0,0,0,.6);
  --ink:#e8eaed; --mut:#98a0ab; --dim:#6b7380;
  --accent:#4c9ee3; --accent-soft:rgba(76,158,227,.14);
  --ok:#3fb27f; --ok-dim:#2f8560; --warn:#d9a13b; --bad:#d95757; --info:#4c9ee3;
  --ok-glow:rgba(63,178,127,.4); --warn-glow:rgba(217,161,59,.35); --bad-glow:rgba(217,87,87,.35);
  --grid:transparent;
}
:root[data-theme="light"]{
  --bg:#f4f5f7; --bg-soft:#eceef1; --panel:#ffffff; --panel2:#f6f7f9;
  --hair:#e2e4e8; --hair2:#d0d3d9; --shadow:0 8px 24px -18px rgba(30,30,30,.3);
  --ink:#1b1e24; --mut:#5b626c; --dim:#9aa0aa;
  --accent:#2f7fc9; --accent-soft:rgba(47,127,201,.10);
  --ok:#2c9c60; --ok-dim:#5a8a70; --warn:#b9791a; --bad:#cf4b45; --info:#2f7fc9;
  --ok-glow:rgba(44,156,96,.3); --warn-glow:rgba(185,121,26,.3); --bad-glow:rgba(207,75,69,.3);
  --grid:transparent;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:13.5px;line-height:1.5;-webkit-font-smoothing:antialiased}
.wrap{max-width:1500px;margin:0 auto;padding:20px 26px}
h1{font-size:17px;margin:0}
a{color:var(--accent)}
.eyebrow{font-family:var(--mono);font-size:9.5px;letter-spacing:1.4px;text-transform:uppercase;color:var(--dim)}
.hdr{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.hdr select{background:var(--panel2);border:1px solid var(--hair2);color:var(--ink);font-family:var(--mono);font-size:11px;border-radius:5px;padding:4px 7px}
.badge{font-family:var(--mono);font-size:9.5px;border:1px solid var(--hair2);border-radius:10px;padding:1px 8px;color:var(--mut);white-space:nowrap}
.badge.warn{color:var(--warn);border-color:var(--warn)}
.badge.bad{color:var(--bad);border-color:var(--bad)}
.pill{border:1px solid var(--hair2);border-radius:11px;padding:2px 10px;font-family:var(--mono);font-size:10px;color:var(--mut);cursor:pointer;background:transparent}
.pill.on{border-color:var(--accent);color:var(--ink);background:var(--accent-soft)}
.pill[disabled]{opacity:.45;cursor:default}
.gap{flex:1}
.layout{display:grid;grid-template-columns:196px minmax(0,1fr) 292px;gap:16px;align-items:start}
@media(max-width:1120px){.layout{grid-template-columns:1fr}.palette,.pane{position:static;max-height:none}}
.palette,.pane{background:var(--panel);border:1px solid var(--hair);border-radius:var(--r);box-shadow:var(--shadow);padding:12px;position:sticky;top:14px;max-height:calc(100vh - 40px);overflow-y:auto}
.pgroup{margin-bottom:9px}
.pgroup .eyebrow{display:block;margin-bottom:4px}
.pitem{display:flex;align-items:center;gap:7px;width:100%;background:transparent;border:1px dashed transparent;border-radius:5px;color:var(--ink);font-size:11.5px;padding:3px 6px;cursor:pointer;text-align:left}
.pitem:hover{background:var(--accent-soft);border-color:var(--hair2)}
.pitem.off{opacity:.5}
.pitem .ico{width:16px;display:inline-block;text-align:center}
.pitem .phase{margin-left:auto;font-family:var(--mono);font-size:8.5px;color:var(--warn);white-space:nowrap}
.canvaswrap{background:var(--panel);border:1px solid var(--hair);border-radius:var(--r);box-shadow:var(--shadow);padding:14px 16px 18px;min-width:0;position:relative}
.errbar{border:1px solid var(--bad);border-radius:var(--r);background:rgba(217,87,87,.08);color:var(--ink);padding:8px 12px;margin-bottom:10px;font-size:12px}
.errbar .eyebrow{color:var(--bad)}
.errbar ul{margin:4px 0 0;padding-left:18px}
.dagwrap{position:relative;overflow-x:auto;margin-top:6px;padding:26px 8px 14px;border:1px solid var(--hair);border-radius:var(--r)}
.dag{display:flex;align-items:flex-start;gap:44px;width:max-content;padding:6px 10px;position:relative;z-index:1}
.rank{display:flex;flex-direction:column;gap:18px}
.node{border:1px solid var(--hair2);border-radius:var(--r);background:var(--panel2);cursor:pointer;position:relative;width:172px;padding:8px 10px 7px}
.node.softb{border-style:dashed}
.node.sel{border-color:var(--accent);background:var(--accent-soft)}
.node .ico{width:16px;display:inline-block;text-align:center}
.node .nm{font-size:12px;font-weight:600;overflow-wrap:anywhere}
.node .sum{font-size:10.5px;color:var(--mut);display:block;margin-top:1px;line-height:1.35;overflow-wrap:anywhere}
.node .meta{display:flex;align-items:center;gap:6px;margin-top:5px}
.node .agent{font-family:var(--mono);font-size:9px;color:var(--accent);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tag{font-family:var(--mono);font-size:8.5px;letter-spacing:.5px;text-transform:uppercase;border-radius:3px;padding:1px 5px;white-space:nowrap;margin-left:auto}
.tag.hard{color:var(--ok);border:1px solid var(--ok)}
.tag.soft{color:var(--warn);border:1px dashed var(--warn)}
.tag.badt{color:var(--bad);border:1px solid var(--bad)}
.glyph{position:absolute;top:-9px;right:-8px;width:18px;height:18px;border-radius:50%;display:none;align-items:center;justify-content:center;font-size:10px;font-weight:700;background:var(--panel);border:1.5px solid var(--dim);color:var(--dim);z-index:2}
.observed .glyph{display:inline-flex}
.glyph.ok{border-color:var(--ok);color:var(--ok)}
.glyph.fail{border-color:var(--bad);color:var(--bad)}
.observed .dimmed{opacity:.32}
@keyframes pulse{0%{box-shadow:0 0 0 0 var(--ok-glow)}70%{box-shadow:0 0 0 8px transparent}100%{box-shadow:0 0 0 0 transparent}}
.running{animation:pulse 1.6s infinite}
@media (prefers-reduced-motion: reduce){.running{animation:none;outline:2px solid var(--ok)}}
.box{border:1.5px solid var(--accent);border-radius:var(--r);padding:20px 14px 10px;position:relative}
.box>.boxtag{position:absolute;top:-9px;left:12px;background:var(--panel);border:1px solid var(--accent);border-radius:9px;color:var(--accent);font-family:var(--mono);font-size:9.5px;padding:0 8px;white-space:nowrap;cursor:pointer}
.box .inner{display:flex;align-items:center;gap:40px}
.box .foot{border-top:1px dashed var(--hair2);margin-top:12px;padding-top:6px;display:flex;gap:12px;flex-wrap:wrap;align-items:center;font-family:var(--mono);font-size:9.5px;color:var(--mut);max-width:420px}
.box.stage{border-color:var(--hair2);background:rgba(76,158,227,.04)}
.box.stage>.boxtag{border-color:var(--hair2);color:var(--mut)}
.chev{position:absolute;top:-9px;right:10px;background:var(--panel);border:1px solid var(--hair2);border-radius:9px;color:var(--mut);font-family:var(--mono);font-size:9.5px;padding:0 7px;cursor:pointer;z-index:2}
svg.edges{position:absolute;left:0;top:0;overflow:visible;pointer-events:none;z-index:0}
svg.edges .lbl{font-family:var(--mono);font-size:8.5px;letter-spacing:.4px}
.observed svg.edges path.e.dimmed{opacity:.18}
.observed svg.edges text.dimmed{opacity:.18}
.legend{display:flex;gap:14px;margin-top:12px;color:var(--dim);font-size:11px;flex-wrap:wrap;align-items:center}
.sw{display:inline-block;width:18px;height:0;border-top:2px solid;vertical-align:middle;margin-right:4px}
.pane h3{font-size:13px;margin:2px 0 8px;display:flex;align-items:center;gap:7px}
.pane h3 .tag{margin-left:auto}
.frow{display:flex;gap:8px;align-items:flex-start;flex-wrap:wrap;margin:7px 0}
.frow .lab{font-family:var(--mono);font-size:9.5px;letter-spacing:.8px;text-transform:uppercase;color:var(--dim);min-width:86px}
.frow .lab .req{color:var(--bad)}
.frow .val{font-family:var(--mono);font-size:10.5px;color:var(--ink);overflow-wrap:anywhere}
.frow .val.unset{color:var(--dim)}
.pane details{border:1px solid var(--hair);border-radius:5px;padding:6px 9px;margin:9px 0}
.pane summary{font-family:var(--mono);font-size:9.5px;letter-spacing:.8px;text-transform:uppercase;color:var(--dim);cursor:pointer}
.guard{display:flex;gap:7px;align-items:flex-start;border:1px solid var(--hair2);border-radius:5px;padding:6px 9px;margin:9px 0;font-size:11px;color:var(--mut)}
.note{font-size:11px;color:var(--mut)}
button:focus-visible,.node:focus-visible{outline:2px solid var(--accent);outline-offset:1px}
@media (prefers-reduced-motion: reduce){*{transition:none!important}}
/* --- P3b (#365): editor affordances (only shown when editable) --- */
.pill.save{border-color:var(--ok);color:var(--ok)}
.pill.save[disabled]{opacity:.4;border-color:var(--hair2);color:var(--mut)}
.badge.unsaved{color:var(--warn);border-color:var(--warn)}
.badge.shadow{color:var(--accent);border-color:var(--accent)}
.pitem[draggable="true"]{cursor:grab}
.pitem[draggable="true"]:active{cursor:grabbing}
.dropzone{align-self:stretch;min-width:14px;border:1px dashed transparent;border-radius:var(--r)}
.dropzone.hot{border-color:var(--accent);background:var(--accent-soft)}
.ehandle{position:absolute;top:50%;right:-6px;transform:translateY(-50%);width:11px;height:11px;border-radius:50%;background:var(--panel);border:1.5px solid var(--accent);cursor:crosshair;z-index:3;display:none}
.editable .node .ehandle,.editable .box .ehandle{display:block}
.box>.ehandle{top:14px;transform:none}
svg.edges path.hit{pointer-events:stroke;cursor:pointer}
.exbtn{cursor:pointer}
.pane input,.pane select,.pane textarea{background:var(--panel2);border:1px solid var(--hair2);color:var(--ink);font-family:var(--mono);font-size:10.5px;border-radius:5px;padding:4px 7px;max-width:170px}
.pane textarea{width:100%;max-width:none;min-height:52px;resize:vertical}
.pane input[readonly]{opacity:.7;cursor:not-allowed}
.frow.locked .lab{color:var(--dim)}
/* --- P3c (#367): navigation overlays — search highlight + minimap --- */
.search{background:var(--panel2);border:1px solid var(--hair2);color:var(--ink);font-family:var(--mono);font-size:11px;border-radius:5px;padding:4px 7px;width:132px}
.search::placeholder{color:var(--dim)}
.node.searchoff,.box.searchoff{opacity:.28}
.node.searchhit{border-color:var(--warn);box-shadow:0 0 0 2px var(--warn-glow)}
.box.searchhit{border-color:var(--warn)}
@keyframes flashpulse{0%{box-shadow:0 0 0 3px var(--warn-glow)}100%{box-shadow:0 0 0 0 transparent}}
.node.flash,.box.flash{animation:flashpulse .9s ease-out}
@media (prefers-reduced-motion: reduce){.node.flash,.box.flash{animation:none;outline:2px solid var(--warn)}}
.minimap{position:absolute;right:16px;bottom:16px;width:176px;height:104px;background:var(--panel2);border:1px solid var(--hair2);border-radius:5px;box-shadow:var(--shadow);overflow:hidden;z-index:4}
.minimap[hidden]{display:none}
.mmsvg{display:block;width:176px;height:104px;cursor:pointer}
.mmnode{fill:var(--hair2);stroke:var(--dim);stroke-width:.5}
.mmnode.off{fill:var(--hair);opacity:.4;stroke:none}
.mmnode.hit{fill:var(--warn);stroke:none}
.mmview{fill:var(--accent-soft);stroke:var(--accent);stroke-width:1;cursor:grab}
@media(max-width:1120px){.minimap{display:none}}

/* ---- Phase D1 (#383): view tabs + gallery/triggers/runs lists (v6 mockup
   classes, same token palette) ---- */
.tabs{display:flex;gap:6px;margin:10px 0 12px}
.tab{font:inherit;font-size:12.5px;background:var(--panel);border:1px solid var(--hair);color:var(--mut);border-radius:8px;padding:6px 12px;cursor:pointer}
.tab.on{color:var(--ink);border-color:var(--accent);background:var(--accent-soft)}
.tview{margin-top:6px}
.vhead{display:flex;align-items:baseline;gap:10px;margin:6px 0 10px}
.vhead .note{color:var(--dim);font-size:12px}
#trigmsg,#galmsg{min-height:18px;color:var(--mut);font-size:12px;margin:0 0 8px}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:10px}
.pcard{background:var(--panel);border:1px solid var(--hair);border-radius:var(--r);padding:12px;box-shadow:var(--shadow)}
.pcard .hd{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.pcard .nm{font-weight:600}
.pcard .kv{color:var(--mut);font-size:12px;margin-top:4px}
.pcard .acts{display:flex;gap:8px;margin-top:8px;align-items:center;flex-wrap:wrap}
.pcard .acts .off{color:var(--dim);font-size:12px;cursor:not-allowed}
.badge.trust{border-color:var(--hair2)}
.tier-auto{color:var(--ok)}
.tier-watch{color:var(--warn)}
.tchips{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.tchip{font-family:var(--mono);font-size:10.5px;border:1px solid var(--hair);border-radius:9px;padding:1px 8px;color:var(--mut)}
.tchip.okc{border-color:var(--ok-dim);color:var(--ok)}
.tchip.warnc{border-color:var(--warn);color:var(--warn)}
.tchip.badc{border-color:var(--bad);color:var(--bad)}
.refbar{border:1px solid var(--bad);border-radius:var(--r);padding:8px 12px;margin-top:10px;color:var(--bad);font-family:var(--mono);font-size:11px;overflow-x:auto}
.trow{background:var(--panel);border:1px solid var(--hair);border-radius:var(--r);padding:10px 12px;margin-bottom:8px}
.trow.refused{border-color:var(--bad)}
.trow .rline{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.trow .rline+.rline{margin-top:6px}
.trow .nm{font-weight:600}
.trow .kv{color:var(--mut);font-size:12px}
.switch{display:inline-flex;width:26px;height:14px;border-radius:8px;background:var(--ok-dim);position:relative;flex:none}
.switch .knob{position:absolute;top:2px;right:2px;width:10px;height:10px;border-radius:50%;background:var(--ink)}
.switch.off{background:var(--hair2)}
.switch.off .knob{right:auto;left:2px;opacity:.6}
.pill.go{border-color:var(--ok-dim);color:var(--ok)}
.pill:disabled{opacity:.45;cursor:not-allowed}
.switch[data-act]{cursor:pointer}
.trigform{background:var(--panel);border:1px solid var(--accent);border-radius:var(--r);padding:12px;margin-bottom:10px}
.trigform .frow{display:flex;align-items:center;gap:8px;margin:5px 0;flex-wrap:wrap}
.trigform .lab{color:var(--mut);font-size:11px;min-width:110px;font-family:var(--mono)}
.trigform input,.trigform select{background:var(--panel2);border:1px solid var(--hair2);color:var(--ink);font-family:var(--mono);font-size:11px;border-radius:5px;padding:4px 7px}
.trigform input[readonly]{opacity:.7;cursor:not-allowed}
.trigform .sect{margin-top:8px;border-top:1px solid var(--hair);padding-top:8px}
.trigform label.note{display:inline-flex;align-items:center;gap:2px}
.runrow{display:flex;align-items:center;gap:10px;flex-wrap:wrap;background:var(--panel);border:1px solid var(--hair);border-radius:var(--r);padding:8px 12px;margin-bottom:6px;font-size:12.5px}
.runrow.child{margin-left:34px;border-style:dashed}
.runrow .oc{font-family:var(--mono);font-size:11px}
.runrow .oc.ok{color:var(--ok)}
.runrow .oc.bad{color:var(--bad)}
.runrow .oc.warn{color:var(--warn)}
.runrow .oc.acc{color:var(--accent)}
.runrow .tok{font-family:var(--mono)}
.runrow .kv{color:var(--mut)}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <a href="/" title="back to the control room">← control room</a>
    <h1>pipeline</h1>
    <select id="repopick" aria-label="repo"></select>
    <select id="rolepick" aria-label="role"></select>
    <input id="search" class="search" type="search" placeholder="find node…"
           aria-label="find an activity by id, type, or agent" autocomplete="off">
    <span id="searchcount" class="badge" style="display:none"></span>
    <span id="prov"></span>
    <span id="runcrumb"></span>
    <span id="shadowchip"></span>
    <span class="gap"></span>
    <span id="ledgerchip"></span>
    <span id="capchip"></span>
    <button class="pill" id="obsbtn">⚡ last run</button>
    <button class="pill on" id="mapbtn" title="toggle the overview map">🗺 map</button>
    <span id="unsaved"></span>
    <button class="pill" id="revertbtn" style="display:none">revert</button>
    <button class="pill save" id="savebtn" style="display:none">save</button>
  </div>
  <!-- Phase D1 (#383): view tabs -- gallery / triggers / runs are list views
       over /api/triggers; canvas is the existing P3a-P3c page unchanged. -->
  <div class="tabs" id="tabs" role="tablist">
    <button class="tab" data-view="gallery">🗂 pipelines</button>
    <button class="tab" data-view="triggers">⚡ triggers</button>
    <button class="tab" data-view="runs">▶ runs</button>
    <button class="tab" data-view="canvas">🎨 canvas</button>
  </div>
  <section id="v-gallery" class="tview" hidden></section>
  <section id="v-triggers" class="tview" hidden></section>
  <section id="v-runs" class="tview" hidden></section>
  <div id="v-canvas" hidden>
  <div class="layout">
    <aside class="palette" id="palette"></aside>
    <main class="canvaswrap">
      <div id="errbar"></div>
      <div class="dagwrap" id="dagwrap">
        <svg class="edges" id="edgesvg"></svg>
        <div class="dag" id="dag"></div>
      </div>
      <div class="legend">
        <span><span class="sw" style="border-color:var(--ok)"></span>on success</span>
        <span><span class="sw" style="border-color:var(--bad)"></span>on failure</span>
        <span><span class="sw" style="border-color:var(--dim);border-top-style:dashed"></span>on completion</span>
        <span><span class="tag hard">enforced</span> engine-owned</span>
        <span><span class="tag soft">instructed</span> compiled into the brief</span>
        <span class="note" id="legendnote">read-only viewer</span>
      </div>
      <div class="minimap" id="minimap" hidden aria-hidden="true">
        <svg id="mmsvg" class="mmsvg"></svg>
      </div>
    </main>
    <aside class="pane" id="pane"></aside>
  </div>
  </div><!-- /#v-canvas -->
</div>

<script>
"use strict";
/* P3a viewer: renders /api/pipeline truth. NO client-side state invention:
   every fact on screen traces to the payload (doc, validator errors, journal
   last_run, in-flight statuses, ledger). Signature-guarded: the poll only
   re-renders when the payload BYTES change (#174/#238 class), so an idle
   fixture never churns the DOM. */
let VIEW = null;          // last payload (parsed) -- SERVER TRUTH (lighting etc.)
let VIEWSIG = "";         // last payload (raw string) -- the render guard
/* Phase D1 (#383): view tabs. The three list views render /api/triggers
   behind their own raw-bytes guard (TRIGSIG); the canvas keeps VIEWSIG.
   Only the ACTIVE tab's payload is fetched each tick. */
const D1_VIEWS = ["gallery", "triggers", "runs", "canvas"];
let CURVIEW = "triggers"; // active tab
let TRIGSIG = "";         // /api/triggers raw-bytes render guard
let TRIGDATA = null;      // parsed /api/triggers payload
let CANVAS_STALE = false; // payload changed while the canvas tab was hidden
let REPO = "";            // managed repo path (set at bootstrap)
let TICK_FN = null;       // the active-view tick, kicked on tab switch
let SEL = "";             // selected unit/node id ("" = nothing)
let OBSERVED = false;
const COLLAPSED = new Set();   // container ids, survives re-render
let SEARCH = "";               // P3c: active search/filter query (lowercased), survives re-render
let MAP_ON = true;             // P3c: minimap visible when the canvas overflows

/* P3b (#365) editor state. WORKING is a dirty working COPY of the doc the
   canvas + pane render from; the server payload (VIEW) still owns the
   read-only overlays (last_run, in_flight, ledger). A live tick NEVER
   clobbers WORKING while DIRTY (the #202 bar). Nothing POSTs until Save. */
let WORKING = null;       // deep clone of the editable doc; render reads THIS
let BRIEFS = {};          // {basename: content} for briefs edited this session
let DIRTY = false;        // unsaved edits pending
let EDIT_SEQ = 0;         // bumps on every edit -- guards save against in-flight edits
const CTOKEN = (document.querySelector('meta[name="ae-control-token"]')||{}).content || "";
const MODEL_CHOICES=__MODEL_CHOICES__;

function esc(x){return String(x).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;")}
function qs(){return new URLSearchParams(location.search)}
function clone(o){ return o == null ? o : JSON.parse(JSON.stringify(o)); }

/* Editable = a BOUND pipeline with a loadable, server-known doc AND a real
   control token (the page is served by the dashboard). A wrapped role, an
   unreadable doc, or a raw file (no token) stays READ-ONLY -- P3a behaviour,
   no edit affordances. Editing writes to the var-shadow only (SD-34). */
function hasToken(){ return CTOKEN && CTOKEN !== "__CONTROL" + "_TOKEN__"; }
function editable(){
  return !!(VIEW && !VIEW.error && VIEW.doc && WORKING &&
            VIEW.source && VIEW.source.kind === "pipeline" && hasToken());
}
function curDoc(){ return WORKING || (VIEW && VIEW.doc) || null; }
function effectiveEdges(doc){
  // mirror pipeline.effective_edges: declared edges, else the synthesized
  // implicit success-chain over top-level units.
  if(doc && Array.isArray(doc.edges) && doc.edges.length) return doc.edges;
  const order = topUnits(doc || {});
  const out = [];
  for(let i = 0; i + 1 < order.length; i++)
    out.push({from: order[i], to: order[i+1], on: "success"});
  return out;
}
function curEdges(){
  const d = curDoc();
  // an in-sync WORKING matches VIEW.edges_effective; after edits WORKING
  // diverges and the client synth is authoritative.
  return d ? effectiveEdges(d) : (VIEW && VIEW.edges_effective || []);
}
function adoptWorking(){    // baseline WORKING from server truth (only when !DIRTY)
  WORKING = VIEW && VIEW.doc ? clone(VIEW.doc) : null;
  BRIEFS = {};
}
function markDirty(){ DIRTY = true; EDIT_SEQ++; updateHeader(); }
function briefText(ref){   // pane seeds from edits-first, else server truth
  if(ref in BRIEFS) return BRIEFS[ref];
  const b = VIEW && VIEW.briefs || {};
  return (ref in b) ? b[ref] : null;
}
function nodeIndex(id){ const ns = (curDoc()||{}).nodes||[]; return ns.findIndex(n => n && n.id === id); }
function uniqueNodeId(base){
  const ns = (curDoc()||{}).nodes||[], cons = (curDoc()||{}).containers||[];
  const taken = new Set(ns.map(n => n && n.id).concat(cons.map(c => c && c.id)));
  let i = 1, id = base;
  while(taken.has(id)){ id = base + "-" + (++i); }
  return id;
}

/* ---- layout: longest-path ranking over effective edges ---- */
function topUnits(doc){
  // mirror of pipeline._top_units: nodes not inside any container, with the
  // container at its first child's position.
  const childCon = {};
  for(const c of (doc.containers||[])) if(c && c.id)
    for(const ch of (c.children||[])) childCon[ch] = c.id;
  const out = [], seen = new Set();
  for(const n of (doc.nodes||[])){
    if(!n || !n.id) continue;
    const con = childCon[n.id];
    if(con === undefined) out.push(n.id);
    else if(!seen.has(con)){ seen.add(con); out.push(con); }
  }
  return out;
}
function rankUnits(units, edges){
  const known = new Set(units);          // degraded-truth guard (Codex CP1):
  // an invalid doc can carry edges to unknown ids -- rank what is rankable,
  // the error banner names the rest; never NaN/crash.
  const fwd = edges.filter(e => !e.back && known.has(e.from) && known.has(e.to));
  const rank = {}; units.forEach(u => rank[u] = 0);
  for(let pass = 0; pass < units.length; pass++){
    let moved = false;
    for(const e of fwd){
      if(rank[e.to] < rank[e.from] + 1){ rank[e.to] = rank[e.from] + 1; moved = true; }
    }
    if(!moved) break;                    // longest-path layering, O(V·E) cap
  }
  const cols = [];
  units.forEach(u => { (cols[rank[u]] = cols[rank[u]] || []).push(u); });
  return cols.filter(c => c && c.length);
}

/* ---- P3c search/filter: pure predicates over curDoc() ----
   SEARCH is page state like SEL/OBSERVED/COLLAPSED: it survives a re-render and
   render() re-applies it, so a live update never drops the filter. Matching is a
   case-insensitive substring over a node/container's id + type/kind + runs_as
   values. Nothing here renders raw doc text -- highlighting toggles CSS classes
   on the already-esc()'d cards; matched ids never reach the DOM un-escaped. */
function nodeSearchText(u){
  if(!u || typeof u !== "object") return "";
  const parts = [u.id, u.type, u.kind];
  const ra = u.runs_as;
  if(ra && typeof ra === "object") for(const v of Object.values(ra)) parts.push(v);
  return parts.filter(x => x != null).map(String).join(" ").toLowerCase();
}
function nodeMatches(u, q){ return q === "" ? true : nodeSearchText(u).indexOf(q) >= 0; }
function matchedIds(q){
  const d = curDoc(), ids = new Set();
  if(!d || !q) return ids;
  for(const n of (d.nodes||[])) if(n && n.id && nodeMatches(n, q)) ids.add(n.id);
  for(const c of (d.containers||[])) if(c && c.id && nodeMatches(c, q)) ids.add(c.id);
  return ids;
}
function childMatched(id, hits){
  const c = conById(id);
  return !!c && (c.children||[]).some(ch => hits.has(ch));
}
function firstMatchId(q){
  const hits = matchedIds(q);
  if(!hits.size) return null;
  const d = curDoc() || {};
  // Visual left-to-right, top-to-bottom order = the SAME ranked columns the
  // canvas lays out (rankUnits over topUnits + curEdges), NOT raw topUnits order
  // -- longest-path layering can move a unit to a later column than its
  // declaration index, so jumping by topUnits order could skip a leftward match
  // (Codex CP1). Mirror the render layout exactly.
  for(const col of rankUnits(topUnits(d), curEdges())){
    for(const u of col){
      if(hits.has(u)) return u;
      const c = conById(u);
      if(c) for(const ch of (c.children||[])) if(hits.has(ch)) return ch;
    }
  }
  for(const id of hits) return id;                 // any hit (defensive: unranked)
  return null;
}

/* Toggle highlight/dim classes on the rendered cards WITHOUT a rebuild (so the
   pane, selection, and caret are untouched). A container card lights when it OR
   any child matches, so a wide search does not blank a box whose child matched.
   Callers that also want the minimap shading refreshed call drawMinimap() after
   (Task 2 defines it; the event wiring guards it with typeof so search stands
   alone). */
function applySearch(){
  const q = SEARCH, cnt = document.getElementById("searchcount");
  const cards = document.querySelectorAll("#dag [data-uid]");
  if(!q){
    cards.forEach(el => el.classList.remove("searchhit","searchoff"));
    if(cnt) cnt.style.display = "none";
    return;
  }
  const hits = matchedIds(q);
  cards.forEach(el => {
    const on = hits.has(el.dataset.uid) || childMatched(el.dataset.uid, hits);
    el.classList.toggle("searchhit", on);
    el.classList.toggle("searchoff", !on);
  });
  if(cnt){ cnt.style.display = ""; cnt.textContent = hits.size + (hits.size===1?" match":" matches"); }
}
function jumpToSearch(){
  const box = document.getElementById("search");
  if(box) box.blur();                              // #16: the jump ENDS -> release focus
  if(!SEARCH) return;
  const id = firstMatchId(SEARCH);
  if(!id) return;
  sel(id);                                         // select -> render() (header persists)
  requestAnimationFrame(() => {
    const el = document.querySelector(`#dag [data-uid="${CSS.escape(id)}"]`);
    if(!el) return;
    el.scrollIntoView({block:"nearest", inline:"center", behavior:"smooth"});
    el.classList.add("flash");
    setTimeout(() => el.classList.remove("flash"), 900);
  });
}

/* ---- observed lighting projections (journal facts only) ---- */
function lastRunMaps(){
  const lit = {nodes:{}, units:new Set(), via:{}};
  const lr = VIEW && VIEW.last_run;
  if(!lr || !Array.isArray(lr.nodes)) return lit;
  for(const en of lr.nodes){
    if(!en || !en.id) continue;
    lit.nodes[en.id] = en;               // LAST entry per node id wins
    if(en.unit){ lit.units.add(en.unit);
      if(!(en.unit in lit.via)) lit.via[en.unit] = en.via || []; }
  }
  return lit;
}
function edgeLit(e, lit){
  // an edge is lit when both endpoints RAN and the target's recorded `via`
  // includes this edge's kind -- derived from journal facts, never guessed.
  if(e.back) return (VIEW.last_run && VIEW.last_run.bounces &&
                     VIEW.last_run.bounces[e.from + "->" + e.to]) ? true : false;
  return lit.units.has(e.from) && lit.units.has(e.to) &&
         (lit.via[e.to] || []).indexOf(e.on) >= 0;
}

/* ---- cards ---- */
function nodeById(id){ return ((curDoc()||{}).nodes||[]).find(n => n && n.id === id); }
function conById(id){ return ((curDoc()||{}).containers||[]).find(c => c && c.id === id); }
function sheetFor(type){ return (VIEW.spec||{})[type]; }

function card(n, lit, inflight){
  const sheet = sheetFor(n.type);
  const invalid = !sheet;
  const icon = invalid ? "?" : sheet.icon;
  const entry = lit.nodes[n.id];
  const dim = OBSERVED && !entry ? " dimmed" : "";
  const glyph = OBSERVED && entry
    ? `<span class="glyph ${entry.outcome === "success" ? "ok" : "fail"}">${entry.outcome === "success" ? "✓" : "✕"}</span>` : "";
  const run = (inflight[n.id] === "dispatched") ? " running" : "";
  const runsAs = n.runs_as ? Object.entries(n.runs_as).map(([k,v]) => esc(v)).join("·") : "";
  const bounce = OBSERVED && entry && entry.bounce ? ` <span class="badge warn">↩ bounce ${esc(entry.bounce)}</span>` : "";
  const tag = invalid ? `<span class="tag badt">invalid</span>`
    : (n.type === "git_ops" ? `<span class="tag hard">enforced</span>` : `<span class="tag soft">instructed</span>`);
  return `<div class="node softb${SEL===n.id?" sel":""}${dim}${run}" data-uid="${esc(n.id)}" tabindex="0">
    ${glyph}<span class="ico">${icon}</span> <span class="nm">${esc(n.id)}</span>
    <span class="sum">${invalid ? "unknown type: " + esc(n.type) : esc(sheet.label)}${bounce}</span>
    <div class="meta">${runsAs?`<span class="agent">${runsAs}</span>`:""}${tag}</div>
    <div class="ehandle" data-ehandle="${esc(n.id)}" title="drag to draw an edge"></div>
  </div>`;
}
function containerBox(con, lit, inflight){
  const sheet = sheetFor(con.kind) || {icon:"?", label:con.kind};
  const kids = (con.children||[]).map(nodeById).filter(Boolean);
  const anyLit = kids.some(k => lit.nodes[k.id]);
  const dim = OBSERVED && !anyLit ? " dimmed" : "";
  const running = kids.some(k => inflight[k.id] === "dispatched") ||
                  inflight[con.id] === "dispatched";
  if(COLLAPSED.has(con.id)){
    return `<div class="node${SEL===con.id?" sel":""}${dim}${running?" running":""}" data-uid="${esc(con.id)}" tabindex="0">
      <span class="ico">${sheet.icon}</span> <span class="nm">${esc(con.id)}</span>
      <span class="sum">${esc(con.kind)} · ${kids.length} steps (collapsed)</span>
      <div class="meta"><button class="pill" data-collapse="${esc(con.id)}">expand</button></div>
    </div>`;
  }
  const foot = con.kind === "loop"
    ? `<div class="foot"><span><b>exit when:</b> ${esc(con.exit_when||"")}</span><span class="tag soft">instructed</span>
       <span style="margin-left:auto"><b>cap:</b> ${esc(con.max_rounds||"?")} rounds</span><span class="tag hard">enforced</span></div>` : "";
  return `<div class="box${con.kind==="stage"?" stage":""}${dim}${running?" running":""}" data-uid="${esc(con.id)}">
    <span class="boxtag" data-seluid="${esc(con.id)}" title="the container's own pane">${sheet.icon} ${esc(con.kind)} · ${esc(con.id)}</span>
    <button class="chev" data-collapse="${esc(con.id)}" title="collapse this container">▾</button>
    <div class="ehandle" data-ehandle="${esc(con.id)}" title="drag to draw an edge"></div>
    <div class="inner">${kids.map(k => card(k, lit, inflight)).join("")}</div>${foot}</div>`;
}

/* ---- canvas ---- */
function render(){
  if(!VIEW) return;
  const err = document.getElementById("errbar");
  const errors = VIEW.error ? [VIEW.error] : (VIEW.errors || []);
  err.innerHTML = errors.length
    ? `<div class="errbar"><span class="eyebrow">pipeline invalid — the engine refuses to dispatch this document</span>
       <ul>${errors.map(e => `<li>${esc(e)}</li>`).join("")}</ul></div>` : "";
  const src = VIEW.source || {};
  document.getElementById("prov").innerHTML = VIEW.error ? "" :
    `<span class="badge">${src.kind === "wrapped" ? "auto-wrapped from role" : esc((src.dir||"") + " · v" + src.version)}</span>
     <b style="margin-left:6px">${esc(src.name||"")}</b>`;
  const lg = VIEW.ledger;
  document.getElementById("ledgerchip").innerHTML = lg
    ? `<span class="badge" title="trust is earned per trigger (auto at ≥20 runs with ≥95% pass over the last 20)">🛡 ${esc(lg.tier)} · ${esc(lg.runs)} runs · ${esc(lg.passes)} pass</span>` : "";
  const caps = (curDoc()||{}).caps || null;
  document.getElementById("capchip").innerHTML = caps && caps.max_parallel
    ? `<span class="badge" title="the pipeline's dispatch ceiling — engine-owned">⛓ max_parallel ${esc(caps.max_parallel)} · enforced</span>` : "";
  const obs = document.getElementById("obsbtn");
  obs.disabled = !VIEW.last_run;
  obs.title = VIEW.last_run ? "light the last run's observed path" : "no runs recorded";
  obs.classList.toggle("on", OBSERVED);
  updateHeader();
  renderPalette();
  const dagwrap = document.getElementById("dagwrap");
  dagwrap.classList.toggle("observed", OBSERVED);
  dagwrap.classList.toggle("editable", editable());
  const dag = document.getElementById("dag");
  if(VIEW.error || !curDoc()){ dag.innerHTML = `<span class="note">${esc(VIEW.error || "document unreadable — see the errors above")}</span>`;
    document.getElementById("edgesvg").innerHTML = ""; drawMinimap(); renderPane(); return; }
  const lit = lastRunMaps();
  const inflight = (VIEW.in_flight && VIEW.in_flight.units) || {};
  const units = topUnits(curDoc());
  const cols = rankUnits(units, curEdges());
  dag.innerHTML = cols.map(col =>
    `<div class="rank">${col.map(uid => {
      const con = conById(uid);
      if(con) return containerBox(con, lit, inflight);
      const n = nodeById(uid);
      return n ? card(n, lit, inflight) : "";
    }).join("")}</div>`).join("");
  applySearch();                     // re-apply the active filter to the fresh cards (P3c)
  if(!paneFocused()) renderPane();   // never yank a pane input mid-edit (#14/#16)
  requestAnimationFrame(() => { drawEdges(); drawMinimap(); });   // P3c: map in the same frame
}
function anchor(el, side){
  const c = document.getElementById("dagwrap"), cr = c.getBoundingClientRect(), r = el.getBoundingClientRect();
  const x = r.left - cr.left + c.scrollLeft, y = r.top - cr.top + c.scrollTop;
  if(side === "l") return [x, y + r.height/2];
  if(side === "r") return [x + r.width, y + r.height/2];
  if(side === "t") return [x + r.width/2, y];
  return [x + r.width/2, y + r.height];
}
function drawEdges(){
  const c = document.getElementById("dagwrap"), svg = document.getElementById("edgesvg");
  if(!VIEW || !curDoc()){ svg.innerHTML = ""; return; }
  svg.setAttribute("width", c.scrollWidth); svg.setAttribute("height", c.scrollHeight);
  const lit = lastRunMaps();
  let defs = `<defs>${["success","failure","completion"].map(k => {
    const col = k === "success" ? "ok" : (k === "failure" ? "bad" : "dim");
    return `<marker id="m-${k}" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 z" fill="var(--${col})"/></marker>`;}).join("")}</defs>`;
  let body = "";
  for(const e of curEdges()){
    const fe = document.querySelector(`[data-uid="${CSS.escape(e.from)}"]`);
    const te = document.querySelector(`[data-uid="${CSS.escape(e.to)}"]`);
    if(!fe || !te) continue;
    let d, lblx, lbly;
    if(e.back){
      const [x1,y1] = anchor(fe,"t"), [x2,y2] = anchor(te,"t");
      const top = Math.min(y1,y2) - 46;
      d = `M ${x1} ${y1} C ${x1} ${top}, ${x2} ${top}, ${x2} ${y2}`;
      lblx = (x1+x2)/2; lbly = top + 4;
    } else {
      const [x1,y1] = anchor(fe,"r"), [x2,y2] = anchor(te,"l");
      d = `M ${x1} ${y1} C ${x1+22} ${y1}, ${x2-22} ${y2}, ${x2} ${y2}`;
      lblx = (x1+x2)/2; lbly = (y1+y2)/2 - 6;
    }
    const col = e.on === "success" ? "ok" : (e.on === "failure" ? "bad" : "dim");
    // canonicalize the marker id to a KNOWN value: e.on comes from the doc,
    // which for an invalid (intentionally-rendered) doc is untrusted -- an
    // arbitrary `on` string interpolated into url(#m-…) would inject SVG
    // attributes (Codex CP2). Only success/failure/completion have markers.
    const mk = (e.on === "success" || e.on === "failure") ? e.on : "completion";
    const dimmed = OBSERVED && !edgeLit(e, lit) ? " dimmed" : "";
    const dash = e.on === "completion" ? ` stroke-dasharray="4 4"` : "";
    body += `<path class="e${dimmed}" d="${d}" fill="none" stroke="var(--${col})" stroke-width="1.6"${dash} marker-end="url(#m-${mk})"/>`;
    if(editable() && !e.back)
      body += `<path class="hit" data-efrom="${esc(e.from)}" data-eto="${esc(e.to)}" data-eon="${esc(e.on)}" d="${d}" fill="none" stroke="transparent" stroke-width="12"><title>${esc(e.on)} — click to cycle · shift-click to delete</title></path>`;
    if(e.back){
      const used = (VIEW.last_run && VIEW.last_run.bounces && VIEW.last_run.bounces[e.from+"->"+e.to]) || 0;
      const lbl = `↩ max ${e.max_bounces}` + (OBSERVED && used ? ` · used ${used}` : "") + ` · enforced`;
      body += `<text class="lbl${dimmed}" x="${lblx}" y="${lbly}" text-anchor="middle" fill="var(--${col})">${esc(lbl)}</text>`;
    }
  }
  svg.innerHTML = defs + body;
}

/* ---- P3c minimap: a scaled overview measured from the rendered cards ----
   Geometry mirrors anchor()/drawEdges exactly (rect - dagwrapRect + scroll), so
   the map can never disagree with the layout. Bare <rect>s only -- no untrusted
   text reaches the map (prevention-log #6 is satisfied by construction). Shown
   only when the canvas overflows AND MAP_ON; hidden otherwise (a fully-visible
   graph needs no map). Redrawn only from render()'s frame + resize + a filter
   change -- never on an idle tick, so the panel is temporally stable (#13). */
const MM_W = 176, MM_H = 104, MM_PAD = 6;
function drawMinimap(){
  const mm = document.getElementById("minimap"), svg = document.getElementById("mmsvg");
  const wrap = document.getElementById("dagwrap");
  // Guard MUST match render()'s early-return contract (`VIEW.error || !curDoc()`),
  // not just !curDoc(): an error payload can arrive with a still-parseable doc
  // present, and #dag then shows the error note (no cards) -- hide the map rather
  // than leave a stale overview (Codex CP1).
  if(!mm || !svg || !wrap || !VIEW || VIEW.error || !curDoc()){ if(mm) mm.hidden = true; return; }
  const sw = wrap.scrollWidth, sh = wrap.scrollHeight;
  const cw = wrap.clientWidth, ch = wrap.clientHeight;
  // Gate on HORIZONTAL overflow only -- the canvas's sole meaningful scroll axis.
  // dagwrap has no bounded height, so a tall graph grows the PAGE (window scroll),
  // it never scrolls inside dagwrap; and the negative-top glyphs + top padding
  // leave a constant ~24px phantom vertical scrollHeight that must NOT trip the
  // gate (it would show a map for a graph that visually fits). The map is for
  // wide DAGs; width overflow is exactly its trigger.
  const overflow = sw > cw + 4;
  if(!MAP_ON || !overflow || sw <= 0 || sh <= 0){ mm.hidden = true; return; }
  mm.hidden = false;
  const scale = Math.min((MM_W - 2*MM_PAD) / sw, (MM_H - 2*MM_PAD) / sh);
  const ox = MM_PAD, oy = MM_PAD;
  const cr = wrap.getBoundingClientRect();
  const hits = SEARCH ? matchedIds(SEARCH) : null;
  let blocks = "";
  for(const el of wrap.querySelectorAll(".dag [data-uid]")){
    const r = el.getBoundingClientRect();
    const x = ox + (r.left - cr.left + wrap.scrollLeft) * scale;
    const y = oy + (r.top  - cr.top  + wrap.scrollTop ) * scale;
    const w = Math.max(2, r.width  * scale), h = Math.max(2, r.height * scale);
    let cls = "mmnode";
    if(hits){ const on = hits.has(el.dataset.uid) || childMatched(el.dataset.uid, hits);
      cls += on ? " hit" : " off"; }
    blocks += `<rect class="${cls}" x="${x.toFixed(1)}" y="${y.toFixed(1)}" `
            + `width="${w.toFixed(1)}" height="${h.toFixed(1)}" rx="1"/>`;
  }
  const vx = ox + wrap.scrollLeft * scale, vy = oy + wrap.scrollTop * scale;
  const vw = Math.max(3, cw * scale), vh = Math.max(3, ch * scale);
  svg.setAttribute("viewBox", `0 0 ${MM_W} ${MM_H}`);
  svg.setAttribute("width", MM_W); svg.setAttribute("height", MM_H);
  svg.innerHTML = blocks + `<rect id="mmview" class="mmview" x="${vx.toFixed(1)}" `
    + `y="${vy.toFixed(1)}" width="${vw.toFixed(1)}" height="${vh.toFixed(1)}"/>`;
  mm._scale = scale; mm._ox = ox; mm._oy = oy;   // stash for drag + cheap updates
}
function updateMMView(){
  const mm = document.getElementById("minimap");
  if(!mm || mm.hidden || !mm._scale) return;
  const wrap = document.getElementById("dagwrap"), view = document.getElementById("mmview");
  if(!view) return;
  view.setAttribute("x", (mm._ox + wrap.scrollLeft * mm._scale).toFixed(1));
  view.setAttribute("y", (mm._oy + wrap.scrollTop  * mm._scale).toFixed(1));
}

/* ---- palette (read-only spec-sheet previews; deferred honestly greyed) ---- */
const GROUP_ORDER = ["source","work","verify","communicate","ops","structure"];
function renderPalette(){
  const spec = VIEW && VIEW.spec || {};
  const groups = {};
  for(const [k,v] of Object.entries(spec)) (groups[v.group] = groups[v.group] || []).push([k,v]);
  const ed = editable();
  document.getElementById("palette").innerHTML = GROUP_ORDER.filter(g => groups[g]).map(g =>
    `<div class="pgroup"><span class="eyebrow">${esc(g)}</span>${groups[g].map(([k,v]) =>
      `<button class="pitem${v.deferred?" off":""}" data-type="${esc(k)}"${(ed && !v.deferred)?' draggable="true"':''}
        title="${v.deferred ? esc("not yet executable — " + (v.deferred_reason||"")) : (ed ? "click: preview · drag: drop onto the canvas to add" : "click: preview its spec sheet")}">
        <span class="ico">${v.icon}</span>${esc(v.label)}${v.deferred?`<span class="phase">${esc((v.deferred_reason||"").split(" ")[0])}</span>`:""}
      </button>`).join("")}</div>`).join("")
    + `<div class="pgroup" style="border-top:1px solid var(--hair);padding-top:8px"><span class="note">${ed ? "drag a type onto the canvas to add a node · click to preview" : "palette previews only — bind a pipeline to edit"}</span></div>`;
}
function previewType(t){ SEL = "type:" + t; render(); }

/* ---- property pane (schema-driven, read-only) ---- */
function valRow(label, value, required, hint){
  const has = value !== undefined && value !== null && value !== "";
  const shown = has ? esc(typeof value === "object" ? JSON.stringify(value) : value)
                    : ("— unset" + (hint ? " · " + esc(hint) : ""));
  return `<div class="frow"><span class="lab">${required?`<span class="req">●</span> `:""}${esc(label)}</span>
    <span class="val${has?"":" unset"}">${shown}</span></div>`;
}
function sheetRows(sheet, node){
  // values come from the node's TOP-LEVEL keys (validated docs have no
  // `config` sub-object -- Codex CP1); a semantic field the P1/P2 schema
  // does not carry yet renders "— unset" with its hint. Honest, not padded.
  const req = (sheet.required||[]).map(([f,h]) => valRow(f, node ? node[f] : undefined, true, h)).join("");
  const opt = (sheet.optional||[]).length
    ? `<details><summary>optional</summary>${sheet.optional.map(([f,h]) => valRow(f, node ? node[f] : undefined, false, h)).join("")}</details>` : "";
  const guard = (sheet.guarded||[]).map(g => `<div class="guard">🔒 <span><b>guarded:</b> ${esc(g)} — visible, not removable.</span></div>`).join("");
  const emits = sheet.emits ? `<div class="frow"><span class="lab">emits</span><span class="note">${esc(sheet.emits)}</span></div>` : "";
  return req + opt + guard + emits;
}

const EFFORTS = ["", "low", "medium", "high", "xhigh", "max"];

function setField(scope, id, field, val){
  const d = curDoc(); if(!d) return;
  if(scope === "runs_as" || scope === "con-runs_as"){
    const owner = scope === "runs_as" ? (d.nodes||[])[nodeIndex(id)] : conById(id);
    if(!owner) return;
    const ra = Object.assign({}, owner.runs_as);
    if(val === "") delete ra[field]; else ra[field] = val;
    if(Object.keys(ra).length) owner.runs_as = ra; else delete owner.runs_as;
    return;
  }
  if(scope === "con"){
    const c = conById(id); if(!c) return;
    if(field === "max_rounds"){ const n = parseInt(val, 10);
      if(!isNaN(n)) c.max_rounds = n; else delete c.max_rounds; }
    else if(val === "") delete c[field]; else c[field] = val;
    return;

function removeNode(id){

/* ---- editor gestures: palette drag-to-place · edge draw / cycle / delete ----
   Every gesture mutates WORKING only and re-renders; NOTHING posts until Save.
   Operator-authored ids come from uniqueNodeId (safe charset), never free text
   into a path. */
function ensureExplicitEdges(){   // materialize the implicit chain before editing
  const d = curDoc(); if(!d) return;
  if(!Array.isArray(d.edges) || !d.edges.length) d.edges = effectiveEdges(d);
}
function reaches(a, b){           // can a reach b via forward (non-back) edges?
  const adj = {};
  for(const e of curEdges()) if(!e.back) (adj[e.from] = adj[e.from] || []).push(e.to);
  const seen = new Set(), stack = [a];
  while(stack.length){ const x = stack.pop();
    if(x === b) return true;
    if(seen.has(x)) continue; seen.add(x);
    for(const y of (adj[x]||[])) stack.push(y); }
  return false;
}
function edgeHint(msg){
  document.getElementById("errbar").innerHTML =
    `<div class="errbar"><span class="eyebrow">edit not applied</span><ul><li>${esc(msg)}</li></ul></div>`;
}
function addEdge(from, to){
  if(from === to){ edgeHint("an edge can't loop a node to itself"); return; }
  ensureExplicitEdges();
  const d = curDoc();
  if(d.edges.some(e => e.from === from && e.to === to && !e.back)){ edgeHint("that edge already exists"); return; }
  if(reaches(to, from)){ edgeHint("that edge would create a cycle — declare a back-edge on the source doc instead"); return; }
  d.edges.push({from, to, on: "success"});
  markDirty(); render();
}
function cycleEdge(from, to, on){
  ensureExplicitEdges();
  const order = ["success","failure","completion"];
  const e = curDoc().edges.find(x => x.from === from && x.to === to && x.on === on);
  if(!e) return;
  e.on = order[(order.indexOf(e.on) + 1) % 3];
  markDirty(); render();
}
function deleteEdge(from, to, on){
  ensureExplicitEdges();
  const es = curDoc().edges;
  const i = es.findIndex(x => x.from === from && x.to === to && x.on === on);
  if(i >= 0){ es.splice(i, 1); markDirty(); render(); }
}
function placeNode(type){
  const d = curDoc(); if(!d) return;
  const before = topUnits(d);           // tail BEFORE adding the node
  ensureExplicitEdges();
  const id = uniqueNodeId((type.replace(/[^a-z0-9_]/gi, "_").toLowerCase()) || "node");
  const ref = id + ".md";
  (d.nodes = d.nodes || []).push({id, type, brief_ref: ref});
  BRIEFS[ref] = "(new " + type + " brief)\n";
  if(before.length) d.edges.push({from: before[before.length-1], to: id, on: "success"});
  SEL = id; markDirty(); render();
}

/* click / drag the map -> scroll the canvas so the pointed-at spot centers.
   Reads the svg's own client rect so it is correct wherever the map sits. */
function mmScrollTo(clientX, clientY){
  const mm = document.getElementById("minimap"), svg = document.getElementById("mmsvg");
  const wrap = document.getElementById("dagwrap");
  if(!mm || !mm._scale) return;
  const r = svg.getBoundingClientRect();
  const cx = ((clientX - r.left) - mm._ox) / mm._scale;
  const cy = ((clientY - r.top ) - mm._oy) / mm._scale;
  wrap.scrollLeft = cx - wrap.clientWidth  / 2;
  wrap.scrollTop  = cy - wrap.clientHeight / 2;
  updateMMView();
}

async function saveNow(){
  if(!editable() || !DIRTY) return;
  const src = VIEW.source || {}, errbar = document.getElementById("errbar");
  const repo = qs().get("repo"), role = qs().get("role");
  const seqAtSubmit = EDIT_SEQ;                    // snapshot: detect edits mid-POST
  try{
    const res = await fetch("/api/control", {method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({action:"pipeline_save", token:CTOKEN, repo,
        name: src.name, doc: WORKING, briefs: BRIEFS})});   // pipeline selected by name, not role
    const out = await res.json().catch(() => ({}));
    if(res.status === 200 && out.ok){
      if(EDIT_SEQ !== seqAtSubmit){
        // the operator edited WHILE the save was in flight (Codex CP2): the
        // posted bytes are persisted, but clearing/adopting now would clobber
        // the newer edits. Keep them DIRTY; the next Save persists them.
        updateHeader();
        return;
      }
      DIRTY = false; BRIEFS = {}; VIEWSIG = "";   // force a re-fetch of server truth
      updateHeader();
      await tick(repo, role);                     // shadow is now the effective read
    } else {
      errbar.innerHTML = `<div class="errbar"><span class="eyebrow">save refused — your edits are kept</span><ul><li>${esc(out.error || ("HTTP " + res.status))}</li></ul></div>`;
    }
  }catch(e){
    errbar.innerHTML = `<div class="errbar"><span class="eyebrow">save failed — your edits are kept</span><ul><li>${esc(String(e))}</li></ul></div>`;
  }
}
function revertNow(){
  if(!DIRTY) return;
  adoptWorking(); DIRTY = false; render();
}

function paramInput(p, cur, ph){
  const key = esc(p.name);
  let inp;
  if(p.type === "bool"){
    const v = (cur === true || cur === "true") ? "true"
            : (cur === false || cur === "false") ? "false" : "";
    // tri-state: a checkbox cannot express "omit", and an unchecked box
    // would fabricate a false override (CP1 pass-2 finding 4)
    inp = `<select data-param="${key}" data-ptype="bool">
      <option value=""${v === "" ? " selected" : ""}>(unset)</option>
      <option value="true"${v === "true" ? " selected" : ""}>true</option>
      <option value="false"${v === "false" ? " selected" : ""}>false</option></select>`;
  } else if(p.type === "enum"){
    const opts = [`<option value=""${cur == null ? " selected" : ""}>(unset)</option>`]
      .concat((p.choices || []).map(c =>
        `<option value="${esc(c)}"${String(cur) === String(c) ? " selected" : ""}>${esc(c)}</option>`));
    inp = `<select data-param="${key}" data-ptype="enum">${opts.join("")}</select>`;
  } else {
    const hint = ph != null ? ph
               : ("default" in p) ? "default: " + String(p.default)
               : (p.required ? "required" : "optional");
    inp = `<input data-param="${key}" data-ptype="${esc(p.type || "string")}" type="${p.type === "number" ? "number" : "text"}" value="${cur == null ? "" : esc(String(cur))}" placeholder="${esc(hint)}">`;
  }
  const req = p.required ? ` <span style="color:var(--bad)">*</span>` : "";
  const note = p.type === "secret" ? ` <span class="note">credential LABEL, never the secret value</span>` : "";
  return `<div class="frow"><span class="lab">${key} <span class="note">${esc(p.type || "string")}</span>${req}</span>${inp}${note}</div>`;
}
function collectFormParams(){
  const params = {};
  document.querySelectorAll("#trigform [data-param]").forEach(el => {
    const v = el.value;
    if(v === "" || v == null) return;                 // blank = omit
    const t = el.dataset.ptype;
    let out = v;
    if(t === "bool") out = (v === "true");
    else if(t === "number"){ const n = Number(v); out = isNaN(n) ? v : n; }
    params[el.dataset.param] = out;
  });

}
function readTrigForm(){
  const g = id => document.getElementById(id);
  const doc = {name: ((g("tf-name") || {}).value || "").trim(),
               pipeline: (g("tf-pipe") || {}).value || "",
               firing: {mode: (g("tf-mode") || {}).value || "manual"},
               enabled: !!(g("tf-enabled") || {}).checked};
  if(doc.firing.mode === "schedule")
    doc.firing.schedule = ((g("tf-sched") || {}).value || "").trim();
  if(doc.firing.mode === "event"){
    doc.firing.event = (g("tf-event") || {}).value || "";
    const map = {};
    document.querySelectorAll("#trigform select[data-map]").forEach(s => {
      if(s.value) map[s.dataset.map] = s.value;
    });
    if(Object.keys(map).length) doc.firing.map = map;
  }
  const pol = (g("tf-policy") || {}).value || "skip";
  doc.concurrency = {policy: pol,
                     max: pol === "parallel"
                       ? Math.max(1, Number((g("tf-max") || {}).value) || 1) : 1};
  const lane = ((g("tf-lane") || {}).value || "").trim();
  if(lane) doc.lane = lane;
  const params = collectFormParams();
  if(Object.keys(params).length) doc.params = params;
  const wins = [];
  document.querySelectorAll("#trigform .winrow").forEach(row => {
    const st = (row.querySelector('[data-win="start"]') || {}).value || "";
    const en = (row.querySelector('[data-win="end"]') || {}).value || "";

}

  if(p.source === "committed") return v + "template";
  if(p.source === "shadow") return v + "template · local edits";
  if(p.source === "wrapped") return v + "wrapped";
  const pr = p.provenance;
  if(pr && pr.created === "clone"){
    let b = v + "clone · from " + esc(pr.source)
          + (pr.source_version != null ? "@v" + esc(String(pr.source_version)) : "");
    if(pr.diverged === true) b += " · ⚠ diverged";
    return b;
  }
  if(pr && pr.created === "blank") return v + "created blank";
  return v + "local";
}
function renderGallery(tv){
  ensureGalSkeleton();
  const box = document.getElementById("galcards");
  let h = `<div class="cards">`;
  for(const p of (tv.pipelines || [])){
    const chips = (p.triggers || []).map(n => {
      const t = (tv.triggers || []).find(x => x.name === n) || {};
      return `<span class="tchip ${t.tier === "auto" ? "okc" : ""}">${esc(n)}${t.tier ? " · " + esc(t.tier) : ""}</span>`;
    }).join("");
    const open = p.source === "wrapped" ? canvasHref({role: p.name}) : canvasHref({name: p.name});
    h += `<div class="pcard">
      <div class="hd"><span class="nm">${esc(p.name)}</span>
        <span class="badge">${provBadge(p)}</span>
        ${p.tier ? `<span class="badge trust ${p.tier === "auto" ? "tier-auto" : "tier-watch"}">🛡 rollup: ${esc(p.tier)}</span>` : ""}
      </div>
      ${p.errors && p.errors.length ? `<div class="refbar">${p.errors.map(esc).join("<br>")}</div>` : ""}
      <div class="kv">${Number(p.nodes)||0} activities</div>
      <div class="tchips">${chips || `<span class="tchip">no triggers</span>`}</div>
      <div class="acts"><a href="${esc(open)}">open canvas</a>${p.source === "wrapped"
        ? `<span class="off" title="wrapped role — a native trigger needs a pipeline binding">＋ trigger</span>`
        : `<button class="pill" data-act="trig_new" data-pipeline="${esc(p.name)}" title="create a trigger bound to this pipeline">＋ trigger</button>`}${p.source === "wrapped"
        ? `<span class="off" title="wrapped role — no pipeline directory to clone">⧉ clone</span>`
        : p.valid
          ? `<button class="pill" data-act="pipe_clone" data-name="${esc(p.name)}" title="create a new pipeline from a copy of this one">⧉ clone</button>`
          : `<span class="off" title="fix the pipeline first — an invalid document refuses to clone">⧉ clone</span>`}${pipeLifeBtn(p)}</div>
    </div>`;
  }
  h += `</div>`;
  for(const w of (tv.refused || []))
    h += `<div class="refbar">${esc(w)}</div>`;
  box.innerHTML = h;
}
/* #388 shadow lifecycle on the gallery: `shadow` = local edits over a
   committed template (reset discards them), `local` = a created pipeline
   (delete removes it + its provenance sidecar); committed templates are
   not dashboard-deletable (SD-34). */
function pipeLifeBtn(p){
  if(p.source === "shadow")
    return `<button class="pill" data-act="pipe_delete" data-name="${esc(p.name)}" title="discard the local edits — the committed template resurfaces">⟲ reset</button>`;
  if(p.source === "local")
    return `<button class="pill" data-act="pipe_delete" data-name="${esc(p.name)}" title="delete this pipeline (removes the var shadow and its provenance record)">🗑 delete</button>`;
  if(p.source === "committed")
    return `<span class="off" title="committed template — edit or remove it in the repo, not the dashboard">🗑</span>`;
  return "";
}
function pipeDeleteConfirm(p){
  if(p.source === "shadow")
    return "Discard the local edits of pipeline '" + p.name + "'?\n" +
      "The committed template becomes live again (next runs read it)." +
      "\n\nContinue?";
  let msg = "Delete pipeline '" + p.name + "'?";
  const bound = p.triggers || [];
  if(bound.length){
    const parts = bound.map(n => {
      const t = ((TRIGDATA || {}).triggers || []).find(x => x.name === n);
      return n + (t && t.enabled ? " (ENABLED)" : "");
    });
    msg += "\nTriggers bound to it — " + parts.join(", ") +
      " — will show missing-pipeline until rebound or deleted.";
  }
  return msg + "\n\nContinue?";
}
async function pipeDelete(name){
  if(!hasToken()) return;
  const m = document.getElementById("galmsg");
  try{
    const res = await fetch("/api/control", {method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({action: "pipeline_delete", token: CTOKEN,
                            repo: REPO, name: name})});
    const out = await res.json().catch(() => ({}));
    if(m) m.textContent = out.ok ? (out.message || "deleted")
                                 : "refused: " + (out.error || ("HTTP " + res.status));
    if(out.ok){ TRIGSIG = ""; await tickLists(); }
  }catch(e){ if(m) m.textContent = "delete failed: " + e; }
}
let GALFORM = null;   // {source: ""|name} -- outside the tick re-render
function openGalForm(source){
  ensureGalSkeleton();
  GALFORM = {source: source || ""};
  const box = document.getElementById("galform");
  const pipes = ((TRIGDATA || {}).pipelines || [])
    .filter(p => p.source !== "wrapped" && p.valid).map(p => p.name);
  const sel = pipes.indexOf(GALFORM.source) >= 0 ? GALFORM.source : "";
  const suggest = sel ? sel + "-copy" : "";
  let h = `<div class="frow"><span class="eyebrow">${sel ? "clone pipeline" : "new pipeline"}</span>` +
    `<span class="note">creates in the live shadow (var/autonomy/pipelines) with a provenance record — the committed packs are untouched</span></div>`;
  h += `<div class="frow"><span class="lab">name</span><input id="gf-name" value="${esc(suggest)}" placeholder="[A-Za-z0-9._-]{1,64}"></div>`;
  h += `<div class="frow"><span class="lab">from</span><select id="gf-src"><option value=""${sel ? "" : " selected"}>— blank starter —</option>${pipes.map(n => `<option${n === sel ? " selected" : ""}>${esc(n)}</option>`).join("")}</select></div>`;
  h += `<div class="frow"><button class="pill save" data-act="pipe_create_send">create</button><button class="pill" data-act="pipe_cancel">cancel</button></div>`;
  box.innerHTML = h; box.hidden = false;
}
function closeGalForm(){
  GALFORM = null;
  const box = document.getElementById("galform");
  if(box){ box.hidden = true; box.innerHTML = ""; }
}
async function pipeCreate(name, source){
  if(!hasToken()) return;
  const m = document.getElementById("galmsg");
  try{
    const body = {action: "pipeline_create", token: CTOKEN, repo: REPO,
                  name: name};
    if(source) body.source = source;
    const res = await fetch("/api/control", {method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify(body)});
    const out = await res.json().catch(() => ({}));
    if(m) m.textContent = out.ok ? (out.message || "created")
                                 : "refused: " + (out.error || ("HTTP " + res.status));
    if(out.ok){ closeGalForm(); TRIGSIG = ""; await tickLists(); }
  }catch(e){ if(m) m.textContent = "create failed: " + e; }
}
async function trigCtl(action, name, params){
  if(!hasToken()) return null;
  try{
    const body = {action: action, name: name, token: CTOKEN, repo: REPO};
    if(params && Object.keys(params).length) body.params = params;
    const res = await fetch("/api/control", {method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify(body)});
    const out = await res.json();
    const m = document.getElementById("trigmsg");
    if(m) m.textContent = out.ok ? (out.message || "done")
                                 : "refused: " + (out.error || "");
    TRIGSIG = "";                 // force a fresh render with the new marker state
    await tickLists();
    return out;
  }catch(e){ return null; /* transient; next tick re-syncs */ }
}
async function tickLists(){
  try{
    const res = await fetch("/api/triggers?repo=" + encodeURIComponent(REPO));
    const raw = await res.text();
    if(raw === TRIGSIG) return;        // unchanged payload -> zero DOM writes
    TRIGSIG = raw;
    TRIGDATA = JSON.parse(raw);
    renderTriggers(TRIGDATA);          // #trigcards only -- #trigmsg and an
    renderRuns(TRIGDATA);              // open #trigform are static siblings
    renderGallery(TRIGDATA);
  }catch(e){ /* transient fetch/parse hiccup: keep the last good render */ }
}
document.getElementById("tabs").addEventListener("click", e => {
  const b = e.target.closest("[data-view]");
  if(b) switchView(b.dataset.view);
});
document.getElementById("v-triggers").addEventListener("click", e => {
  const b = e.target.closest("[data-act]");
  if(!b || b.disabled) return;
  const act = b.dataset.act, name = b.dataset.name || "";
  const t = name && ((TRIGDATA || {}).triggers || []).find(x => x.name === name);
  if(act === "trig_new"){ openTrigForm({pipeline: b.dataset.pipeline || ""}, false); return; }
  if(act === "trig_cancel"){ closeTrigForm(); return; }
  if(act === "trig_edit"){ if(t) openTrigForm(trigDocFromRow(t), true); return; }
  if(act === "trig_save_form"){
    const doc = readTrigForm();
    if(TRIGFORM && TRIGFORM.kind === "edit") doc.name = TRIGFORM.name;  // identity kept
    trigSave(doc.name, doc); return;
  }
  if(act === "trigger_toggle"){ if(t) toggleTrigger(t); return; }
  if(act === "trig_delete"){
    if(t && window.confirm(trigDeleteConfirm(t))) trigCtl("trigger_delete", name);
    return;
  }
  if(act === "fire_open"){ if(t) openFireForm(t); return; }
  if(act === "fire_send"){
    trigCtl("trigger_fire", name, collectFormParams())
      .then(out => { if(out && out.ok) closeTrigForm(); });
    return;
  }
  if(act === "win_add" || act === "win_del"){
    if(!TRIGFORM || TRIGFORM.kind === "fire") return;
    const seed = readTrigForm();
    if(TRIGFORM.kind === "edit") seed.name = TRIGFORM.name;
    seed.run_windows = seed.run_windows || [];
    if(act === "win_add") seed.run_windows.push({start: "09:00", end: "17:00"});
    else seed.run_windows.splice(Number(b.dataset.idx) || 0, 1);
    TRIGFORM.seed = seed; drawTrigForm(); return;
  }
  trigCtl(act, name);
});
/* pipeline/mode/event/policy changes re-shape the form: collect what is
   typed so far, then redraw (the form is outside the tick re-render). */
document.getElementById("v-triggers").addEventListener("change", e => {
  if(!TRIGFORM || TRIGFORM.kind === "fire") return;
  if(["tf-pipe", "tf-mode", "tf-event", "tf-policy"].indexOf(e.target.id) < 0) return;
  const seed = readTrigForm();
  if(TRIGFORM.kind === "edit") seed.name = TRIGFORM.name;
  TRIGFORM.seed = seed;
  drawTrigForm();
});
document.getElementById("v-gallery").addEventListener("click", e => {
  const b = e.target.closest("[data-act]");
  if(!b || b.disabled) return;
  const act = b.dataset.act;
  if(act === "trig_new"){
    switchView("triggers");
    ensureTrigSkeleton();
    openTrigForm({pipeline: b.dataset.pipeline || ""}, false);
    return;
  }
  if(act === "pipe_new"){ openGalForm(""); return; }
  if(act === "pipe_clone"){ openGalForm(b.dataset.name || ""); return; }
  if(act === "pipe_delete"){
    const nm = b.dataset.name || "";
    const p = ((TRIGDATA || {}).pipelines || []).find(x => x.name === nm);
    if(p && window.confirm(pipeDeleteConfirm(p))) pipeDelete(nm);
    return;
  }
  if(act === "pipe_cancel"){ closeGalForm(); return; }
  if(act === "pipe_create_send"){
    const name = (document.getElementById("gf-name") || {value: ""}).value.trim();
    const src = (document.getElementById("gf-src") || {value: ""}).value;
    pipeCreate(name, src);
  }
});

async function loadPickers(){
  try{
    const st = await (await fetch("/api/state")).json();
    const repos = st.repos || [];
    const rp = document.getElementById("repopick"), lp = document.getElementById("rolepick");
    const curRepo = qs().get("repo") || (repos[0] && repos[0].path) || "";
    rp.innerHTML = repos.map(r => `<option value="${esc(r.path)}"${r.path===curRepo?" selected":""}>${esc(r.name)}</option>`).join("");
    const cur = repos.find(r => r.path === curRepo) || repos[0];
    const roles = (cur && cur.roles || []).map(r => r.name);
    const curRole = qs().get("role") || roles[0] || "";
    lp.innerHTML = roles.map(n => `<option${n===curRole?" selected":""}>${esc(n)}</option>`).join("");
    const nav = () => { location.search = "?repo=" + encodeURIComponent(rp.value) + "&role=" + encodeURIComponent(lp.value); };
    rp.addEventListener("change", nav); lp.addEventListener("change", nav);
    return {repo: curRepo, role: curRole};
  }catch(e){ return {repo: qs().get("repo") || "", role: qs().get("role") || ""}; }
}
function renderRunCrumb(){
  // D1 (#383): a token view's breadcrumb -- child canvases link back to
  // their parent's run (decision 7 on #383, both ends reachable).
  const el = document.getElementById("runcrumb");
  if(!el) return;
  const r = VIEW && VIEW.run;
  if(!r){ el.innerHTML = ""; return; }
  let h = `<span class="badge">run ${esc(r.token || "")} · ${esc(r.status || "")}</span>`;
  if(r.parent_token)
    h += ` <a href="${esc(canvasHref({token: r.parent_token}))}" title="open the parent run's canvas">↑ parent ${esc(r.parent_token)}</a>`;
  el.innerHTML = h;
}
async function tick(repo, sel){
  try{
    // D1 selector precedence: token > name > role (the builder enforces
    // exactly-one; the page only ever sends one).
    let q = "";
    if(sel.token)      q = "&token=" + encodeURIComponent(sel.token);
    else if(sel.name)  q = "&name=" + encodeURIComponent(sel.name);
    else               q = "&role=" + encodeURIComponent(sel.role || "");
    const res = await fetch("/api/pipeline?repo=" + encodeURIComponent(repo) + q);
    const raw = await res.text();
    if(raw === VIEWSIG) return;          // unchanged payload -> zero DOM writes
    VIEWSIG = raw;
    VIEW = JSON.parse(raw);
    // The #202 bar: a live tick must NEVER clobber the operator's unsaved edits.
    // Clean -> adopt the fresh doc as the new working baseline. DIRTY -> KEEP
    // WORKING (the operator's graph); the read-only overlays (last_run /
    // in_flight / ledger) still refresh because render() reads them from VIEW.
    if(!DIRTY) adoptWorking();
    renderRunCrumb();
    if(document.getElementById("v-canvas").hidden){
      // hidden geometry reads are all-zero (minimap/edge layout would be
      // garbage) -- defer the render to the tab switch.
      CANVAS_STALE = true;
      return;
    }
    render();
  }catch(e){ /* transient fetch/parse hiccup: keep the last good render */ }
}
(async () => {
  const {repo, role} = await loadPickers();
  REPO = repo || "";
  const sel = {role: qs().get("role") || role || "",
               name: qs().get("name") || "",
               token: qs().get("token") || ""};
  let v = qs().get("view");
  if(D1_VIEWS.indexOf(v) < 0)
    v = (qs().get("role") || sel.name || sel.token) ? "canvas" : "triggers";
  showView(v);
  if(!repo){
    document.getElementById("errbar").innerHTML = `<div class="errbar"><span class="eyebrow">nothing to show</span><ul><li>no managed repo — add one on the control room page</li></ul></div>`;
    showView("canvas");
    return;
  }
  TICK_FN = () => { if(CURVIEW === "canvas") tick(repo, sel); else tickLists(); };
  await TICK_FN();
  setInterval(TICK_FN, 5000);
})();
</script>
