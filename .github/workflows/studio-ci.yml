name: studio-ci

on:
  push:
    branches: [main]
    paths: ['studio/**', '.github/workflows/studio-ci.yml']
  pull_request:
    paths: ['studio/**', '.github/workflows/studio-ci.yml']

defaults:
  run:
    working-directory: studio

jobs:
  studio:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.0.6

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: studio/pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build
