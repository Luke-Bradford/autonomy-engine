name: studio-ci

on:
  push:
    branches: [main]
    paths: ['studio/**', '.github/workflows/studio-ci.yml']
  pull_request:
    paths: ['studio/**', '.github/workflows/studio-ci.yml']

defaults:
  run:
    working-directory: studio

jobs:
  studio:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.0.6

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # NOTE: we do NOT use setup-node's `cache: pnpm`. That helper resolves the
      # store via `pnpm store path` run from the repo ROOT, where it cannot see
      # studio/pnpm-workspace.yaml's `storeDir: .pnpm-store` (action steps ignore
      # `defaults.run.working-directory`), so it targets the GLOBAL store — which
      # `pnpm install` (run in studio/) never populates. On any lockfile change
      # the post-job cache-save then fails with "path does not exist". We cache
      # the real store dir explicitly instead.
      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: studio/.pnpm-store
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('studio/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build
