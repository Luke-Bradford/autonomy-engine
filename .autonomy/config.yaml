# .autonomy/config.yaml -- per-repo policy for the autonomy engine.
# See autonomy-engine/README.md for the full schema reference.

board:
  owner: Luke-Bradford      # GitHub user/org that owns this repo (+ the Projects v2 board, if any)
  project_title: "Autonomy Progress"

engine:
  # account_key omitted on purpose: defaults to 'default', the SAME marker eBull
  # uses, so both repos share one usage-limit reset epoch and back off together
  # on the shared Claude subscription instead of stampeding the same wall.
  requires_claude_md: true   # this repo's workflow assumes CLAUDE.md exists

agent:
  type: claude               # claude | codex
  effort: high               # opus works the harder increment-4 tickets; high effort
  model:
    primary: claude-opus-4-8
    fallback: claude-sonnet-5

merge_gate:
  # bot_comment: safe_merge.sh merges once the review bot posts APPROVE on the
  # latest commit + CI green. Branch protection (required review + CI checks,
  # enforce_admins) still fully applies -- this is the SAME gate that protects
  # main, just driven unattended. Never a silent merge.
  strategy: bot_comment
  author_login: github-actions          # who posts the review verdict
  marker: "Claude Code Review"          # the review comment's header to match
  doc_only_extensions: [".md"]          # doc-only PRs the bot skips -> merge on CI green alone

worktree:
  default_path: "../.{repo-slug}-autonomy"

# Multi-role org (autonomy-engine docs/superpowers/specs/
# 2026-07-02-dynamic-agent-org-design.md + 2026-07-03-lanes-and-board-contract-design.md).
# Every agent -- standard or custom -- is the same declarative shape: enabled
# + account (from the machine accounts registry; omitted = the CLI-login
# subscription) + trigger ({ type: loop | cron | event, ... }) + model/effort
# + scope + behaviour knobs. `prompt:` must point at a real pack file under
# .autonomy/roles/, never a copy. Validate with doctor.sh.
# Loop roles dispatch round-robin; cron/event roles fire via the W1 scheduler
# / W2 event bus inside the same supervisor. A role with an `account:` that
# cannot resolve REFUSES its sessions (fail-safe).
# Live org (enabled 2026-07-03, issue #158): aux roles run on sonnet/medium to
# protect the opus 7-day budget. Only knobs the runtime or the rails actually
# consume are set (issue #149 honesty rule) -- no self_test/blockers/tools/
# regression until they are wired.
roles:
  coder:
    enabled: true
    trigger: { type: loop }
    # model/effort inherit agent.* above (opus, high) -- unchanged behaviour
  qa:
    enabled: true
    trigger: { type: event, on: [pr.opened] }
    scope: { target: diff }
    gate: wait-for-human               # QA raises findings; humans/bot-gate still own the merge
    model: claude-sonnet-5
    effort: medium
    prompt: .autonomy/roles/qa.md
  pm:
    enabled: true
    trigger: { type: cron, schedule: "0 */2 * * *" }
    model: claude-sonnet-5
    effort: medium
    prompt: .autonomy/roles/pm.md
  researcher:
    enabled: true
    trigger: { type: cron, schedule: "0 3 * * *" }
    output: raise-issues               # rail fails closed to a findings list without write access
    web_search: false
    account: local-llm                 # openai_compatible -> local Ollama (BYO-LLM #78); scut off the subscription
    agent: codex                       # codex adapter routes OPENAI_BASE_URL -> --oss local provider
    model: qwen3:14b
    prompt: .autonomy/roles/researcher.md
